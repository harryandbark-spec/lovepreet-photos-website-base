kind = "web"
previewPath = "/"
title = "Lovepreet Photos & Films"
version = "1.0.0"
id = "artifacts/lovepreet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18645

[services.development]
run = "pnpm --filter @workspace/lovepreet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lovepreet", "run", "build" ]
publicDir = "artifacts/lovepreet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18645"
BASE_PATH = "/"
